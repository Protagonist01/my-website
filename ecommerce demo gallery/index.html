<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-commerce Automation Demo Gallery | Henry Fadeni</title>
    <script>
      // Global error tracker to display runtime errors on screen
      window.addEventListener('error', function(event) {
        var errorDiv = document.getElementById('debug-error-banner');
        if (!errorDiv) {
          errorDiv = document.createElement('div');
          errorDiv.id = 'debug-error-banner';
          errorDiv.style.position = 'fixed';
          errorDiv.style.top = '0';
          errorDiv.style.left = '0';
          errorDiv.style.width = '100%';
          errorDiv.style.background = '#ff3333';
          errorDiv.style.color = '#ffffff';
          errorDiv.style.padding = '15px';
          errorDiv.style.zIndex = '99999';
          errorDiv.style.fontSize = '14px';
          errorDiv.style.fontFamily = 'monospace';
          errorDiv.style.whiteSpace = 'pre-wrap';
          errorDiv.style.boxShadow = '0 4px 10px rgba(0,0,0,0.5)';
          errorDiv.style.maxHeight = '50vh';
          errorDiv.style.overflow = 'auto';
          document.body.appendChild(errorDiv);
        }
        errorDiv.innerText += '\nError: ' + event.message + '\nAt: ' + event.filename + ':' + event.lineno + ':' + event.colno + '\nStack:\n' + (event.error ? event.error.stack : 'N/A') + '\n';
      });
      window.addEventListener('unhandledrejection', function(event) {
        var errorDiv = document.getElementById('debug-error-banner');
        if (!errorDiv) {
          errorDiv = document.createElement('div');
          errorDiv.id = 'debug-error-banner';
          errorDiv.style.position = 'fixed';
          errorDiv.style.top = '0';
          errorDiv.style.left = '0';
          errorDiv.style.width = '100%';
          errorDiv.style.background = '#ff3333';
          errorDiv.style.color = '#ffffff';
          errorDiv.style.padding = '15px';
          errorDiv.style.zIndex = '99999';
          errorDiv.style.fontSize = '14px';
          errorDiv.style.fontFamily = 'monospace';
          errorDiv.style.whiteSpace = 'pre-wrap';
          errorDiv.style.boxShadow = '0 4px 10px rgba(0,0,0,0.5)';
          errorDiv.style.maxHeight = '50vh';
          errorDiv.style.overflow = 'auto';
          document.body.appendChild(errorDiv);
        }
        errorDiv.innerText += '\nUnhandled Promise Rejection: ' + event.reason + '\n';
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
