<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Meeting Intelligence — Live Demo</title>
<style>
@font-face{font-family:'Neue Montreal';src:local('Neue Montreal'),local('NeueMontreal-Regular');font-display:swap}@font-face{font-family:'Lores-12';src:local('Lores-12'),local('LoRes 12'),local('LoRes12-Regular');font-display:swap}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090d;--bg2:#0f1117;--bg3:#14161e;
  --border:rgba(255,255,255,0.08);--border-strong:rgba(255,255,255,0.15);
  --text:#f5f5f0;--text-muted:#6b6966;--text-sub:#9c9890;
  --accent:#4f6ef7;
  --font-ui:'Neue Montreal','NeueMontreal',sans-serif;--font-mono:'Lores-12','LoRes 12',monospace;
  --r:12px;--r-sm:8px;
}
body{font-family:var(--font-ui);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center}

/* ── Header ── */
.hd{width:100%;padding:28px 44px 0;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border);padding-bottom:24px}
.hd-left{}
.hd-eyebrow{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.hd-title{font-size:20px;font-weight:700;color:var(--text)}
.hd-right{text-align:right}
.hd-stack{display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;border:1px solid var(--border-strong);font-size:11px;font-weight:500;color:var(--text-sub)}

/* ── Pipeline ── */
.pipeline{width:100%;padding:24px 44px 20px;display:flex;align-items:center}
.sn{display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;flex-shrink:0}
.si{width:42px;height:42px;border-radius:11px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .3s;background:var(--bg2);position:relative;overflow:hidden}
.si.active{border-color:var(--sc,var(--accent));box-shadow:0 0 0 3px var(--sg,rgba(79,110,247,.18));background:var(--sb,rgba(79,110,247,.1))}
.si.done{border-color:rgba(16,163,127,.45);background:rgba(16,163,127,.08)}
.si.done::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:#10a37f;font-weight:700}
.sl{font-size:11px;font-weight:500;color:var(--text-muted);text-align:center;max-width:62px;line-height:1.3}
.sl.active{color:var(--text)}
.sc{flex:1;height:1px;background:var(--border);min-width:16px;margin-bottom:26px;position:relative;overflow:hidden}
.sc .fill{height:100%;background:rgba(16,163,127,.55);width:0%;transition:width .5s ease}

/* ── Progress ── */
.prog{width:calc(100% - 88px);height:1.5px;background:var(--border);border-radius:2px;margin:0 44px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#a855f7);transition:width .5s ease;border-radius:2px}

/* ── Demo panels ── */
.demo{width:100%;padding:16px 44px;display:grid;grid-template-columns:1fr 1fr;gap:14px;min-height:400px}
.ap{border-radius:var(--r);border:1px solid var(--border);background:var(--bg2);overflow:hidden;display:flex;flex-direction:column}
.ap-hd{padding:11px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px;font-weight:500;transition:background .4s}
.ap-body{flex:1;padding:18px;overflow-y:auto}
.dp{border-radius:var(--r);border:1px solid var(--border);background:var(--bg3);overflow:hidden;display:flex;flex-direction:column;font-family:var(--font-mono)}
.dp-hd{padding:10px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text-muted)}
.dp-body{flex:1;padding:15px;font-size:11px;line-height:1.85;overflow-y:auto;color:#c2bfb8}
pre{white-space:pre-wrap;word-break:break-word}

/* ── Controls ── */
.ctrl{width:100%;padding:16px 44px 32px;display:flex;align-items:center;gap:14px}
.cd{flex:1}
.cd-title{font-size:15px;font-weight:600;color:var(--text)}
.cd-sub{font-size:12px;color:var(--text-muted);margin-top:3px;line-height:1.5}
.ctr{font-size:11px;color:var(--text-muted);font-family:var(--font-mono);white-space:nowrap}
.btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border-strong);background:transparent;color:var(--text);font-family:var(--font-ui);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn:hover{background:rgba(255,255,255,.06)}
.btn:active{transform:scale(.98)}
.btn-play{background:var(--accent);border-color:var(--accent);color: #f5f5f0;padding:8px 22px;display:flex;align-items:center;gap:6px}
.btn-play:hover{background:#3d5ce0;border-color:#3d5ce0}
.btn-restart{padding:8px 14px;font-size:12px;opacity:.6}
.btn-restart:hover{opacity:1}

/* ── Animations ── */
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fadein{animation:fadein .35s ease forwards}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.8)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes task-in{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}

/* ── Scrollbar ── */
.scr::-webkit-scrollbar{width:3px}
.scr::-webkit-scrollbar-track{background:transparent}
.scr::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:2px}

/* ── JSON colors ── */
.jk{color:#79b8ff}.js{color:#f5c07a}.jn{color:#79dcaa}.jb{color:#f97583}.jp{color:#5a5855}.jc{color:#5a5855;font-size:10px}

/* ── Fireflies ── */
.ff-card{border:1px solid rgba(255,90,54,.2);border-radius:10px;padding:15px;background:rgba(255,90,54,.06)}
.ff-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;background:rgba(255,90,54,.15);color:#ff7a5c;font-size:11px;font-weight:600;margin-bottom:11px}
.ff-dot{width:6px;height:6px;border-radius:50%;background:#ff5a36;animation:pulse 1.4s infinite}
.ff-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:7px}
.ff-meta{display:flex;gap:14px;margin-bottom:14px;font-size:12px;color:var(--text-muted);flex-wrap:wrap}
.ff-tx{background:var(--bg3);border-radius:8px;padding:11px;font-size:11px;line-height:1.75;color:var(--text-sub);max-height:145px;overflow-y:auto;font-family:var(--font-mono)}
.ff-tx .sp{color:#ff7a5c;font-weight:500}

/* ── n8n ── */
.n8n-node{border:1px solid rgba(234,75,113,.3);border-radius:8px;padding:11px 14px;background:rgba(234,75,113,.07);margin-bottom:9px;font-size:12px}
.n8n-nt{font-weight:600;font-size:13px;color:#ea4b71;margin-bottom:5px}
.n8n-kv{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}
.n8n-cell{background:rgba(234,75,113,.07);border:1px solid rgba(234,75,113,.18);border-radius:7px;padding:9px}
.n8n-cell-k{font-size:10px;color:#ea4b71;font-weight:600;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}
.n8n-cell-v{font-size:12px;color:var(--text)}

/* ── AI ── */
.ai-dots{display:flex;gap:5px;align-items:center;margin-bottom:14px}
.ai-d{width:6px;height:6px;border-radius:50%;background:#10a37f;animation:pulse .8s infinite}
.ai-d:nth-child(2){animation-delay:.2s}
.ai-d:nth-child(3){animation-delay:.4s}
.ai-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:13px}
.ai-stat{background:rgba(16,163,127,.1);border:1px solid rgba(16,163,127,.2);border-radius:8px;padding:9px;text-align:center}
.ai-stat-n{font-size:22px;font-weight:700;color:#10a37f}
.ai-stat-l{font-size:10px;color:var(--text-muted);margin-top:1px}

/* ── Notion ── */
.nw{background:#fff;border-radius:10px;padding:18px 22px;color:#1a1a1a;max-height:310px;overflow-y:auto}
.nt{font-size:19px;font-weight:700;color:#1a1a1a;margin-bottom:11px}
.np{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #eee}
.npl{color:#9b9b9b;font-size:12px;font-weight:500;min-width:68px}
.npv{color:#1a1a1a;font-size:12px}
.ntag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px}
.nh2{font-size:13px;font-weight:700;color:#1a1a1a;margin:13px 0 7px}
.nbody{font-size:12px;color:#4a4a4a;line-height:1.65}
.nbul{font-size:12px;color:#4a4a4a;padding-left:14px;position:relative;line-height:1.7}
.nbul::before{content:'•';position:absolute;left:3px;color:#aaa}

/* ── Asana ── */
.at{border:1px solid rgba(240,106,106,.22);border-radius:8px;padding:11px 13px;background:rgba(240,106,106,.06);margin-bottom:7px;display:flex;align-items:flex-start;gap:9px;opacity:0;transform:translateX(-8px)}
.at.show{animation:task-in .4s ease forwards}
.ach{width:17px;height:17px;border-radius:50%;border:2px solid rgba(240,106,106,.45);flex-shrink:0;margin-top:1px}
.at-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px}
.at-meta{display:flex;gap:9px;font-size:11px;color:var(--text-muted)}
.av{width:15px;height:15px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color: #f5f5f0;vertical-align:middle;margin-right:3px}

/* ── Slack ── */
.sw{background:#1a1d21;border-radius:10px;overflow:hidden;max-height:310px;overflow-y:auto}
.s-hd{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.07);font-size:13px;font-weight:600;color:#e8e6df;display:flex;align-items:center;gap:5px}
.s-ch{color:#36c5f0}
.s-msg{padding:13px;display:flex;gap:10px}
.s-av{width:34px;height:34px;border-radius:7px;background:linear-gradient(135deg,#4f6ef7,#a855f7);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color: #f5f5f0;flex-shrink:0}
.s-body{flex:1}
.s-sender{font-size:14px;font-weight:700;color:#e8e6df;display:flex;align-items:center;gap:6px;margin-bottom:6px}
.s-bot{font-size:10px;font-weight:500;padding:1px 6px;border-radius:3px;background:rgba(54,197,240,.12);color:#36c5f0;border:1px solid rgba(54,197,240,.28)}
.s-text{font-size:12.5px;color:#c2bfb8;line-height:1.65}
.s-text strong{color:#e8e6df;font-weight:600}
.s-div{height:1px;background:rgba(255,255,255,.06);margin:7px 0}
.s-link{color:#36c5f0;text-decoration:none;font-weight:500}
</style>
<link rel="stylesheet" href="./automation-exhibit.css">
</head>
<body>

<!-- Header -->
<div class="hd">
  <div class="hd-left">
    <div class="hd-eyebrow">Automation Demo</div>
    <div class="hd-title">AI Meeting Intelligence System</div>
  </div>
  <div class="hd-right">
    <div class="hd-eyebrow" style="margin-bottom:8px">Built with</div>
    <div class="hd-stack">
      <span class="chip">🔥 Fireflies</span>
      <span class="chip">⚙️ n8n</span>
      <span class="chip">🤖 OpenRouter</span>
      <span class="chip">📋 Notion</span>
      <span class="chip">✅ Asana</span>
      <span class="chip">💬 Slack</span>
    </div>
  </div>
</div>

<!-- Pipeline -->
<div class="pipeline" id="pipeline"></div>

<!-- Progress -->
<div class="prog"><div class="prog-fill" id="prog" style="width:0%"></div></div>

<!-- Demo panels -->
<div class="demo">
  <div class="ap" id="ap">
    <div class="ap-hd" id="ap-hd"></div>
    <div class="ap-body scr fadein" id="ap-body"></div>
  </div>
  <div class="dp">
    <div class="dp-hd" id="dp-hd"></div>
    <div class="dp-body scr" id="dp-body"></div>
  </div>
</div>

<!-- Controls -->
<div class="ctrl">
  <div class="cd">
    <div class="cd-title" id="cd-t"></div>
    <div class="cd-sub" id="cd-s"></div>
  </div>
  <div class="ctr" id="ctr">Step 1 / 6</div>
  <button class="btn" onclick="prev()">← Prev</button>
  <button class="btn btn-play" id="pbtn" onclick="togglePlay()">
    <span id="pico">▶</span><span id="plbl">Auto-play</span>
  </button>
  <button class="btn" onclick="next()">Next →</button>
  <button class="btn btn-restart" onclick="restart()" title="Restart">↺</button>
</div>

<script>
const STEPS = [
{
  id:'ff', label:'Fireflies', emoji:'🔥',
  col:'#ff5a36', glow:'rgba(255,90,54,.2)', bg:'rgba(255,90,54,.09)',
  ap:{col:'#ff5a36', bg:'rgba(255,90,54,.1)', label:'Fireflies.ai', ico:'🔥', sub:'POST /meetingmind → webhook received'},
  dh:'Webhook payload  (raw JSON)',
  dt:'Meeting ends → Webhook fires',
  ds:'Fireflies.ai detects the meeting has ended and sends a POST request to the n8n webhook endpoint with the full transcript, attendees, and recording URL.',
  app:`<div class="ff-card">
    <div class="ff-badge"><span class="ff-dot"></span> Meeting Ended · Webhook Fired</div>
    <div class="ff-title">Leadipedia Architecture &amp; Agency Partnership Sync</div>
    <div class="ff-meta"><span>📅 May 13, 2026 · 14:00 UTC</span><span>👥 2 attendees</span><span>🎥 Recording saved</span></div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <div style="background:rgba(255,90,54,.14);border-radius:7px;padding:7px 11px;font-size:12px;color:#ff7a5c">
        <div style="font-weight:600">Fadeni Henry</div><div style="color:var(--text-muted);font-size:10px;margin-top:1px">Host · fadeni@example.com</div>
      </div>
      <div style="background:rgba(255,90,54,.08);border-radius:7px;padding:7px 11px;font-size:12px;color:#ff9f8a">
        <div>Sarah Jenkins</div><div style="color:var(--text-muted);font-size:10px;margin-top:1px">Attendee · sarah.design@example.com</div>
      </div>
    </div>
    <div style="font-size:10px;font-weight:600;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.07em">Transcript Preview</div>
    <div class="ff-tx scr">
      <span class="sp">Fadeni Henry:</span> Alright, let's kick off. The main goal today is finalizing the Leadipedia architecture and our agency partnership structure. Sarah, did you get a chance to review the V3.1 PRD?<br><br>
      <span class="sp">Sarah Jenkins:</span> I did. I think the 6-agent assembly line looks solid. I'll take ownership of the UI mockups for the main sales cockpit dashboard — should have those done by Friday.<br><br>
      <span class="sp">Fadeni Henry:</span> Perfect. And just to formalize — we decided on a 60/40 equity split for the agency venture, right?<br><br>
      <span class="sp">Sarah Jenkins:</span> Yes, 60/40 is confirmed and we will move forward with that.
    </div>
  </div>`,
  data:`<span class="jc">// Raw Fireflies.ai webhook payload</span>
<span class="jp">{</span>
  <span class="jk">"meetingId"</span>: <span class="js">"ff-meet-9a8b7c6d5e"</span>,
  <span class="jk">"title"</span>: <span class="js">"Leadipedia Architecture &amp; Agency Partnership Sync"</span>,
  <span class="jk">"date"</span>: <span class="js">"2026-05-13T14:00:00Z"</span>,
  <span class="jk">"video_url"</span>: <span class="js">"https://fireflies.ai/view/leadipedia-sync-9a8b7"</span>,
  <span class="jk">"next_meeting"</span>: <span class="js">"2026-05-20T14:00:00Z"</span>,
  <span class="jk">"attendees"</span>: <span class="jp">[</span>
    <span class="jp">{</span>
      <span class="jk">"displayName"</span>: <span class="js">"Fadeni Henry"</span>,
      <span class="jk">"email"</span>: <span class="js">"fadeni@example.com"</span>,
      <span class="jk">"host"</span>: <span class="jb">true</span>
    <span class="jp">},</span>
    <span class="jp">{</span>
      <span class="jk">"displayName"</span>: <span class="js">"Sarah Jenkins"</span>,
      <span class="jk">"email"</span>: <span class="js">"sarah.design@example.com"</span>,
      <span class="jk">"host"</span>: <span class="jb">false</span>
    <span class="jp">}</span>
  <span class="jp">],</span>
  <span class="jk">"transcript"</span>: <span class="js">"Fadeni Henry: Alright, let's kick off..."</span>
<span class="jp">}</span>`
},
{
  id:'norm', label:'Normalize', emoji:'⚙️',
  col:'#ea4b71', glow:'rgba(234,75,113,.2)', bg:'rgba(234,75,113,.09)',
  ap:{col:'#ea4b71', bg:'rgba(234,75,113,.1)', label:'n8n  ·  Code Node', ico:'⚙️', sub:'Normalize Payload  →  cleaning raw data'},
  dh:'Normalized output  (clean schema)',
  dt:'Raw payload structured &amp; cleaned',
  ds:'A JavaScript Code node extracts and reshapes the Fireflies payload into a flat, consistent format — flattening the attendees array, extracting the recording URL, and ensuring field names are predictable downstream.',
  app:`<div style="font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:11px">Code transformation</div>
  <div style="background:var(--bg3);border-radius:8px;padding:13px;font-family:var(--font-mono);font-size:11px;line-height:1.8;color:#c2bfb8;margin-bottom:14px">
    <span style="color:#ea4b71">const</span> data = $input.first().json;<br><br>
    <span style="color:#ea4b71">return</span> [{ <span style="color:#79b8ff">json</span>: {<br>
    &nbsp;&nbsp;<span style="color:#79b8ff">title</span>: data.title,<br>
    &nbsp;&nbsp;<span style="color:#79b8ff">date</span>: data.date,<br>
    &nbsp;&nbsp;<span style="color:#79b8ff">transcript</span>: data.transcript,<br>
    &nbsp;&nbsp;<span style="color:#79b8ff">recordingUrl</span>: data.video_url,<br>
    &nbsp;&nbsp;<span style="color:#79b8ff">attendees</span>: data.attendees<br>
    &nbsp;&nbsp;&nbsp;&nbsp;.map(a => a.displayName).join(<span style="color:#f5c07a">', '</span>)<br>
    }}];
  </div>
  <div class="n8n-kv">
    <div class="n8n-cell"><div class="n8n-cell-k">Attendees</div><div class="n8n-cell-v">Fadeni Henry, Sarah Jenkins</div></div>
    <div class="n8n-cell"><div class="n8n-cell-k">Date</div><div class="n8n-cell-v">2026-05-13T14:00:00Z</div></div>
    <div class="n8n-cell" style="grid-column:1/-1"><div class="n8n-cell-k">Recording URL</div><div class="n8n-cell-v" style="font-size:11px;color:#74c5f5">https://fireflies.ai/view/leadipedia-sync-9a8b7</div></div>
    <div class="n8n-cell" style="grid-column:1/-1"><div class="n8n-cell-k">Next Meeting</div><div class="n8n-cell-v">2026-05-20T14:00:00Z</div></div>
  </div>`,
  data:`<span class="jc">// Output: clean, flat schema ready for LLM</span>
<span class="jp">{</span>
  <span class="jk">"meetingId"</span>: <span class="js">"ff-meet-9a8b7c6d5e"</span>,
  <span class="jk">"title"</span>: <span class="js">"Leadipedia Architecture &amp; Agency Partnership Sync"</span>,
  <span class="jk">"date"</span>: <span class="js">"2026-05-13T14:00:00Z"</span>,
  <span class="jk">"attendees"</span>: <span class="js">"Fadeni Henry, Sarah Jenkins"</span>,
  <span class="jk">"recordingUrl"</span>: <span class="js">"https://fireflies.ai/view/leadipedia-sync-9a8b7"</span>,
  <span class="jk">"nextMeetingDate"</span>: <span class="js">"2026-05-20T14:00:00Z"</span>,
  <span class="jk">"transcript"</span>: <span class="js">"Fadeni Henry: Alright, let's kick off. The main goal today is finalizing the Leadipedia architecture..."</span>
<span class="jp">}</span>`
},
{
  id:'ai', label:'AI Analysis', emoji:'🤖',
  col:'#10a37f', glow:'rgba(16,163,127,.2)', bg:'rgba(16,163,127,.09)',
  ap:{col:'#10a37f', bg:'rgba(16,163,127,.1)', label:'OpenRouter  ·  LLM Chain', ico:'🤖', sub:'Basic LLM Chain  →  transcript extraction'},
  dh:'Structured extraction  (AI output)',
  dt:'LLM extracts meeting intelligence',
  ds:'The transcript is sent to OpenRouter with a strict system prompt. The model returns a typed JSON object containing the meeting summary, confirmed decisions, action items with owners and deadlines, and open questions.',
  app:`<div class="ai-dots"><div class="ai-d"></div><div class="ai-d"></div><div class="ai-d"></div><span style="font-size:12px;color:#10a37f;font-weight:500;margin-left:4px">Model analyzing transcript…</span></div>
  <div style="background:var(--bg3);border-radius:8px;padding:13px;margin-bottom:12px">
    <div style="font-size:10px;color:var(--text-muted);font-weight:600;margin-bottom:7px;text-transform:uppercase;letter-spacing:.07em">System Prompt (excerpt)</div>
    <div style="font-size:11px;font-family:var(--font-mono);color:#c2bfb8;line-height:1.75">
      You are an enterprise meeting intelligence assistant.<br>
      Extract decisions, action items, owners, blockers,<br>
      and unresolved questions. Return <span style="color:#f5c07a">ONLY valid JSON</span>.<br>
      <span style="color:#f97583">Never hallucinate</span> deadlines, owners, or decisions.
    </div>
  </div>
